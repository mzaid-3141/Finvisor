name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-secret-key-not-used-in-production
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          SQL_ECHO: "false"
        run: pytest tests/ -v --tb=short

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
        run: npm run build

  # ─── Deploy (runs only on push to main after both jobs pass) ──────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Replace this step with your actual deployment command.
      # Examples:
      #   - Railway:  railway up
      #   - Render:   curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
      #   - Vercel:   vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
      #   - Fly.io:   flyctl deploy --remote-only
      - name: Deploy placeholder
        run: echo "Add your deployment step here."
