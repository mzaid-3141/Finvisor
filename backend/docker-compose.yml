services:
  db:
    image: postgres:15
    container_name: portfolio-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: portfolio_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio-net

volumes:
  postgres_data:

networks:
  portfolio-net:
    driver: bridge